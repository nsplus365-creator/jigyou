<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="事業管理">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f13">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f0f13'/><text y='.9em' font-size='80' x='10'>📊</text></svg>">
<title>事業管理</title>
<style>
:root {
  --bg:#0f0f13;--surface:#1a1a24;--surface2:#22222f;--border:#2a2a3a;
  --accent:#6c63ff;--accent2:#ff6584;--success:#4caf7d;--warning:#ffb347;
  --danger:#ff4757;--text:#e8e8f0;--text2:#9090a8;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.goal-bar{background:var(--surface);padding:12px 16px;border-bottom:1px solid var(--border);}
.goal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px;color:var(--text2);}
.goal-amount{font-weight:700;color:var(--accent);}
.progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s ease;}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:80px;padding:12px 8px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.content{padding:16px;max-width:900px;margin:0 auto;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:12px;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;}
.stat-value{font-size:20px;font-weight:700;}
.stat-value.success{color:var(--success);}
.stat-value.danger{color:var(--danger);}
.stat-value.accent{color:var(--accent);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#5a52e0;}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.btn-secondary:hover{background:var(--border);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-success{background:var(--success);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px;}
.action-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--surface2);}
th{padding:10px 12px;text-align:left;color:var(--text2);font-weight:600;white-space:nowrap;}
td{padding:10px 12px;border-top:1px solid var(--border);white-space:nowrap;}
tr:hover td{background:var(--surface2);}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-info{background:rgba(108,99,255,.2);color:var(--accent);}
.badge-success{background:rgba(76,175,125,.2);color:var(--success);}
.badge-warning{background:rgba(255,179,71,.2);color:var(--warning);}
.badge-danger{background:rgba(255,71,87,.2);color:var(--danger);}
.badge-gray{background:var(--border);color:var(--text2);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;}
@media(min-width:600px){.modal-overlay{align-items:center;}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;}
@media(min-width:600px){.modal{border-radius:var(--radius);}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:700;}
.modal-close{background:var(--surface2);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600;}
.form-control{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
.form-control:focus{border-color:var(--accent);}
textarea.form-control{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-footer{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}
.calendar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);}
.cal-nav{background:var(--border);border:none;color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:16px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day-label{text-align:center;padding:8px 4px;font-size:11px;color:var(--text2);font-weight:600;background:var(--surface2);border-bottom:1px solid var(--border);}
.cal-cell{min-height:64px;padding:4px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell:hover{background:var(--surface2);}
.cal-cell.today{background:rgba(108,99,255,.1);}
.cal-cell.empty{cursor:default;}
.cal-date{font-size:12px;color:var(--text2);margin-bottom:2px;}
.cal-cell.today .cal-date{color:var(--accent);font-weight:700;}
.cal-income{font-size:10px;color:var(--success);font-weight:600;overflow:hidden;}
.cal-expense{font-size:10px;color:var(--danger);font-weight:600;overflow:hidden;}
.project-grid{display:grid;gap:12px;}
@media(min-width:600px){.project-grid{grid-template-columns:repeat(2,1fr);}}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;cursor:pointer;}
.project-card:hover{border-color:var(--accent);}
.project-name{font-size:16px;font-weight:700;margin-bottom:6px;padding-right:80px;}
.project-desc{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5;}
.project-monetize{background:var(--surface2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text2);margin-bottom:10px;}
.project-monetize strong{color:var(--accent);}
.project-status{position:absolute;top:16px;right:16px;}
.project-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.month-selector{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.empty{text-align:center;padding:40px 20px;color:var(--text2);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filter-row .form-control{flex:1;min-width:120px;}
.profit-pos{color:var(--success);font-weight:700;}
.profit-neg{color:var(--danger);font-weight:700;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:9999;display:none;}
.sub-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface2);border-radius:10px;padding:4px;}
.sub-tab{flex:1;text-align:center;padding:8px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--text2);transition:all .2s;}
.sub-tab.active{background:var(--accent);color:#fff;font-weight:600;}
.profit-calc{background:var(--surface2);border-radius:8px;padding:12px;margin-top:8px;font-size:13px;}
.profit-calc-row{display:flex;justify-content:space-between;padding:3px 0;color:var(--text2);}
.profit-calc-row.total{border-top:1px solid var(--border);margin-top:6px;padding-top:8px;font-weight:700;color:var(--text);}
select.form-control option{background:var(--surface2);color:var(--text);}
.balance-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px;}
.balance-flow{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;}
.balance-item{text-align:center;flex:1;min-width:70px;}
.balance-item-label{font-size:10px;color:var(--text2);margin-bottom:3px;}
.balance-item-value{font-size:15px;font-weight:700;}
.balance-arrow{color:var(--text2);font-size:20px;flex-shrink:0;}
.balance-total{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.fc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
</style>
</head>
<body>

<header class="header">
  <h1>📊 事業管理</h1>
  <span id="todayDate" style="font-size:12px;color:var(--text2);"></span>
</header>

<div class="goal-bar">
  <div class="goal-header">
    <span>🎯 買取大吉FC目標 ¥10,000,000</span>
    <span class="goal-amount" id="goalCurrent">¥0</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="goalProgress" style="width:0%"></div>
  </div>
  <div style="font-size:11px;color:var(--text2);margin-top:4px;text-align:right;" id="goalPercent">0.00% 達成</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('furugiya')">👕 古着</div>
  <div class="tab" onclick="switchTab('fukugyou')">💡 副業</div>
  <div class="tab" onclick="switchTab('shuushi')">📅 収支</div>
</div>

<div class="content">

  <!-- ===== 古着タブ ===== -->
  <div id="tab-furugiya" class="tab-content active">
    <div class="sub-tabs">
      <div class="sub-tab active" onclick="switchSubTab('furugiya','stock')">在庫</div>
      <div class="sub-tab" onclick="switchSubTab('furugiya','sold')">販売済</div>
      <div class="sub-tab" onclick="switchSubTab('furugiya','summary')">月次</div>
    </div>

    <div id="furugiya-stock">
      <div class="action-row">
        <button class="btn btn-primary" onclick="openModal('modal-shiire')">＋ 仕入れ登録</button>
        <button class="btn btn-success" onclick="openModal('modal-hanbai')">💴 販売登録</button>
      </div>
      <div class="filter-row">
        <input type="text" class="form-control" id="filter-stock" placeholder="商品名・ブランドで検索" oninput="renderStock()">
        <select class="form-control" id="filter-stock-status" onchange="renderStock()" style="max-width:120px;">
          <option value="all">全て</option>
          <option value="在庫" selected>在庫のみ</option>
          <option value="販売済">販売済</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>管理番号</th><th>商品名</th><th>ブランド</th><th>仕入値</th><th>状態</th><th>仕入日</th><th>状況</th><th>操作</th></tr></thead>
          <tbody id="stock-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="furugiya-sold" style="display:none">
      <div class="table-wrap">
        <table>
          <thead><tr><th>日付</th><th>管理番号</th><th>商品名</th><th>売値</th><th>送料</th><th>手数料</th><th>利益</th><th>利益率</th><th></th></tr></thead>
          <tbody id="sold-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="furugiya-summary" style="display:none">
      <div class="month-selector">
        <button class="cal-nav" onclick="changeSummaryMonth(-1)">‹</button>
        <span id="summary-month-label" style="font-weight:700;min-width:90px;text-align:center;"></span>
        <button class="cal-nav" onclick="changeSummaryMonth(1)">›</button>
      </div>
      <div class="stats-grid" id="summary-stats"></div>
      <div class="card">
        <div class="card-title">📈 明細</div>
        <div id="summary-detail"></div>
      </div>
    </div>
  </div>

  <!-- ===== 副業タブ ===== -->
  <div id="tab-fukugyou" class="tab-content" style="display:none">
    <div class="action-row">
      <button class="btn btn-primary" onclick="openModal('modal-project')">＋ 新規プロジェクト</button>
      <button class="btn btn-secondary" onclick="openModal('modal-fuku-shuushi')">＋ 収支追加</button>
    </div>
    <div class="project-grid" id="project-grid"></div>
  </div>

  <!-- ===== 収支タブ ===== -->
  <div id="tab-shuushi" class="tab-content" style="display:none">
    <div class="month-selector">
      <button class="cal-nav" onclick="changeCalMonth(-1)">‹</button>
      <span id="cal-month-label" style="font-weight:700;min-width:100px;text-align:center;"></span>
      <button class="cal-nav" onclick="changeCalMonth(1)">›</button>
    </div>
    <!-- 繰り越し残高カード -->
    <div class="balance-card" id="balance-card"></div>
    <div class="stats-grid" id="cal-stats"></div>
    <div class="calendar">
      <div class="cal-grid" id="cal-day-labels"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="card">
      <div class="card-title" style="justify-content:space-between;display:flex;align-items:center;flex-wrap:wrap;gap:6px;">
        <span>📋 収支一覧</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-secondary btn-sm" onclick="openModal('modal-fixed')">🔄 固定費</button>
          <button class="btn btn-secondary btn-sm" onclick="applyFixedCosts()">固定費 適用</button>
          <button class="btn btn-primary btn-sm" onclick="openModal('modal-shuushi')">＋ 追加</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>日付</th><th>区分</th><th>カテゴリ</th><th>金額</th><th>内容</th><th>操作</th></tr></thead>
          <tbody id="shuushi-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

<!-- ===== MODAL: 仕入れ修正 ===== -->
<div class="modal-overlay" id="modal-edit-stock">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ 仕入れ修正</span>
      <button class="modal-close" onclick="closeModal('modal-edit-stock')">✕</button>
    </div>
    <input type="hidden" id="es2-id">
    <div class="form-group">
      <label class="form-label">管理番号</label>
      <input type="text" class="form-control" id="es2-stockid" readonly style="opacity:.5;">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">商品名 *</label>
        <input type="text" class="form-control" id="es2-name">
      </div>
      <div class="form-group">
        <label class="form-label">ブランド</label>
        <input type="text" class="form-control" id="es2-brand">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">仕入れ価格 *</label>
        <input type="number" class="form-control" id="es2-price" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">仕入れ日 *</label>
        <input type="date" class="form-control" id="es2-date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <select class="form-control" id="es2-category">
          <option>トップス</option><option>ボトムス</option><option>アウター</option>
          <option>シューズ</option><option>バッグ</option><option>アクセサリー</option><option>その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">状態</label>
        <select class="form-control" id="es2-condition">
          <option>新品・未使用</option><option>未使用に近い</option><option>目立った傷なし</option>
          <option>やや傷・汚れあり</option><option>傷・汚れあり</option><option>全体的に傷あり</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">目安販売価格</label>
      <input type="number" class="form-control" id="es2-target" placeholder="0">
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <textarea class="form-control" id="es2-memo"></textarea>
    </div>
    <div class="form-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-edit-stock')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEditStock()">保存</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 販売修正 ===== -->

  <div class="modal">

      <button class="modal-close" onclick="closeModal('modal-edit-sale')">✕</button>

    <div class="form-row">

<script>
// ===== DB =====
const DB = {
  get: k => JSON.parse(localStorage.getItem(k)||'[]'),
  set: (k,v) => localStorage.setItem(k,JSON.stringify(v)),
  stocks:    () => DB.get('fg_stocks'),
  sales:     () => DB.get('fg_sales'),
  projects:  () => DB.get('fg_projects'),
  cashflows: () => DB.get('fg_cashflows'),
  fixedCosts:() => DB.get('fg_fixed_costs'),
  getOpeningBalance: () => parseInt(localStorage.getItem('fg_opening_balance')||'0'),
  setOpeningBalance: v => localStorage.setItem('fg_opening_balance', String(v)),
};

// ===== UTILS =====
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtYen(n){return '¥'+Number(n||0).toLocaleString();}
function fmtDate(s){
  if(!s)return '-';
  const d=new Date(s+'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function genId(prefix){return `${prefix}-${Date.now()}-${Math.floor(Math.random()*1000)}`;}
function genStockId(){
  const stocks=DB.stocks();
  const d=new Date();
  const yr=d.getFullYear();
  const mo=String(d.getMonth()+1).padStart(2,'0');
  const key=`FUKU-${yr}${mo}`;
  const cnt=stocks.filter(s=>s.id.startsWith(key)).length;
  return `${key}-${String(cnt+1).padStart(3,'0')}`;
}
function showToast(msg,color='var(--success)'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color; t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}
function statusBadge(s){
  const m={'在庫':'badge-info','販売済':'badge-success','計画中':'badge-gray','進行中':'badge-info','完了':'badge-success','停止':'badge-danger'};
  return `<span class="badge ${m[s]||'badge-gray'}">${s}</span>`;
}

// ===== GOAL =====
const GOAL=10000000;
function updateGoal(){
  const cfs=DB.cashflows();
  const inc=cfs.filter(c=>c.type==='収入').reduce((s,c)=>s+c.amount,0);
  const exp=cfs.filter(c=>c.type==='支出').reduce((s,c)=>s+c.amount,0);
  const total=inc-exp;
  const pct=Math.max(0,Math.min((total/GOAL)*100,100));
  document.getElementById('goalCurrent').textContent=fmtYen(total);
  document.getElementById('goalProgress').style.width=pct+'%';
  document.getElementById('goalPercent').textContent=pct.toFixed(2)+'% 達成';
}

// ===== TABS =====
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const tabs=['furugiya','fukugyou','shuushi'];
    t.classList.toggle('active',tabs[i]===tab);
  });
  ['furugiya','fukugyou','shuushi'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    el.style.display=t===tab?'block':'none';
    el.classList.toggle('active',t===tab);
  });
  if(tab==='fukugyou')renderProjects();
  if(tab==='shuushi')renderCalendar();
}

function switchSubTab(parent,sub){
  const subMap={furugiya:['stock','sold','summary']};
  document.querySelectorAll(`#tab-${parent} .sub-tab`).forEach((t,i)=>{
    t.classList.toggle('active',subMap[parent][i]===sub);
  });
  subMap[parent].forEach(s=>{
    const el=document.getElementById(`${parent}-${s}`);
    if(el) el.style.display=s===sub?'block':'none';
  });
  if(sub==='stock')renderStock();
  if(sub==='sold')renderSold();
  if(sub==='summary')renderSummary();
}

// ===== MODAL =====
function openModal(id){
  if(id==='modal-shiire'){
    document.getElementById('s-id').value=genStockId();
    document.getElementById('s-date').value=todayStr();
  }
  if(id==='modal-hanbai'){
    populateItemSelect();
    document.getElementById('h-date').value=todayStr();
    updateHanbaiCalc();
  }
  if(id==='modal-fuku-shuushi'){
    populateProjectSelect('fs-project');
    document.getElementById('fs-date').value=todayStr();
  }
  if(id==='modal-project'){
    document.getElementById('p-start').value=todayStr();
  }
  if(id==='modal-shuushi'){
    document.getElementById('cs-date').value=todayStr();
  }
  if(id==='modal-fixed'){
    const ob=DB.getOpeningBalance();
    document.getElementById('ob-amount').value=ob||'';
    document.getElementById('ob-current').textContent=ob?`現在の初期残高: ${fmtYen(ob)}`:'';
    renderFixedCostList();
  }
  document.getElementById(id).classList.add('active');
}
function closeModal(id){
  document.getElementById(id).classList.remove('active');
  document.querySelectorAll(`#${id} input:not([readonly]),#${id} textarea`).forEach(el=>el.value='');
}
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('active');});
});

// ===== 古着：仕入れ =====
function saveShiire(){
  const name=document.getElementById('s-name').value.trim();
  const price=parseInt(document.getElementById('s-price').value)||0;
  const date=document.getElementById('s-date').value;
  if(!name||!price||!date){showToast('商品名・価格・日付は必須','var(--danger)');return;}
  const stocks=DB.stocks();
  const item={
    id:document.getElementById('s-id').value,
    name,
    brand:document.getElementById('s-brand').value.trim(),
    purchasePrice:price,
    purchaseDate:date,
    category:document.getElementById('s-category').value,
    condition:document.getElementById('s-condition').value,
    targetPrice:parseInt(document.getElementById('s-target-price').value)||0,
    memo:document.getElementById('s-memo').value.trim(),
    status:'在庫',
    createdAt:new Date().toISOString(),
  };
  stocks.push(item);
  DB.set('fg_stocks',stocks);
  // 仕入れを支出として記録
  const cfs=DB.cashflows();
  cfs.push({id:genId('CF'),date,type:'支出',category:'古着',amount:price,description:`仕入: ${name}`,memo:item.id,auto:true});
  DB.set('fg_cashflows',cfs);
  closeModal('modal-shiire');
  renderStock();
  updateGoal();
  showToast('仕入れを登録しました');
}

function renderStock(){
  const stocks=DB.stocks();
  const kw=(document.getElementById('filter-stock')?.value||'').toLowerCase();
  const sf=document.getElementById('filter-stock-status')?.value||'all';
  const filtered=stocks.filter(s=>{
    const mk=!kw||s.name.toLowerCase().includes(kw)||(s.brand||'').toLowerCase().includes(kw);
    const ms=sf==='all'||s.status===sf;
    return mk&&ms;
  }).slice().reverse();
  const tbody=document.getElementById('stock-tbody');
  if(!filtered.length){
    tbody.innerHTML<`<tr><td colspan="8" style="text-align:center;color:var(--text2);padding:30px;">データがありません</td></tr>`;
    return;
  }
  tbody.innerHTML=filtered.map(s=>`
    <tr>
      <td style="font-size:11px;color:var(--text2);">${s.id}</td>
      <td><strong>${s.name}</strong><br><span style="font-size:11px;color:var(--text2);">${s.category}</span></td>
      <td>${s.brand||'-'}</td>
      <td>${fmtYen(s.purchasePrice)}</td>
      <td style="font-size:11px;">${s.condition}</td>
      <td>${fmtDate(s.purchaseDate)}</td>
      <td>${statusBadge(s.status)}</td>
      <td style="display:flex;gap:4px;">
        ${s.status==='在庫'?`<button class="btn btn-success btn-sm" onclick="quickSell('${s.id}')">売る</button>`:''}
        <button class="btn btn-secondary btn-sm" onclick="openEditStock('${s.id}')">編集</button>
        <button class="btn btn-secondary btn-sm" onclick="deleteStock('${s.id}')">削</button>
      </td>
    </tr>
  `).join('');
}

function deleteStock(id){
  if(!confirm('削除しますお���'))return;
  DB.set('fg_stocks',DB.stocks().filter(s=>s.id!==id));
  renderStock();
}
function openEditStock(id){
  const s=DB.stocks().find(x=>x.id===id);
  if(!s)return;
  document.getElementById('es2-id').value=s.id;
  document.getElementById('es2-stockid').value=s.id;
  document.getElementById('es2-name').value=s.name;
  document.getElementById('es2-brand').value=s.brand||'';
  document.getElementById('es2-price').value=s.purchasePrice;
  document.getElementById('es2-date').value=s.purchaseDate;
  document.getElementById('es2-target').value=s.targetPrice||'';
  document.getElementById('es2-memo').value=s.memo||'';
  const cat=document.getElementById('es2-category');
  for(let i=0;i<cat.options.length;i++){if(cat.options[i].value===s.category){cat.selectedIndex=i;break;}}
  const cond=document.getElementById('es2-condition');
  for(let i=0;i<cond.options.length;i++){if(cond.options[i].value===s.condition){cond.selectedIndex=i;break;}}
  document.getElementById('modal-edit-stock').classList.add('active');
}
function saveEditStock(){
  const id=document.getElementById('es2-id').value;
  const name=document.getElementById('es2-name').value.trim();
  const price=parseInt(document.getElementById('es2-price').value)||0;
  const date=document.getElementById('es2-date').value;
  if(!name||!price||!date){showToast('商品名・価格・日付は必須','var(--danger)');return;}
  const stocks=DB.stocks();
  const idx=stocks.findIndex(s=>s.id===id);
  if(idx<0)return;
  const old=stocks[idx];
  stocks[idx]={
    ...old,name,
    brand:document.getElementById('es2-brand').value.trim(),
    purchasePrice:price,purchaseDate:date,
    category:document.getElementById('es2-category').value,
    condition:document.getElementById('es2-condition').value,
    targetPrice:parseInt(document.getElementById('es2-target').value)||0,
    memo:document.getElementById('es2-memo').value.trim(),
  };
  DB.set('fg_stocks',stocks);
  // 仕入れ支出のcashflowを更新（memo===itemId && 仕入: で識別）
  const cfs=DB.cashflows();
  const cfIdx=cfs.findIndex(c=>c.auto&&c.memo===id&&c.type==='支出'&&c.description&&c.description.startsWith('仕入:'));
  if(cfIdx>=0){
    cfs[cfIdx]={...cfs[cfIdx],amount:price,date,description:`仕入: ${name}`};
    DB.set('fg_cashflows',cfs);
  }
  closeModal('modal-edit-stock');
  renderStock();
  updateGoal();
  showToast('仕入れ情報を更新しました');
}
function quickSell(id){
  openModal('modal-hanbai');

    const sel=document.getElementById('h-item');
    if(sel){sel.value=id;updateHanbaiCalc();}
  },80);
}

function populateItemSelect(preselect){
  const stocks=DB.stocks().filter(s=>s.status==='在庫');
  const sel=document.getElementById('h-item');
  if(!sel)return;
  sel.innerHTML='<option value="">在庫から選択</option>'+
    stocks.map(s=>`<option value="${s.id}" ${s.id===preselect?'selected':''}>${s.id} ${s.name|（${fmtYen(s.purchasePrice)}）</option>`).join('');
}

function updateHanbaiCalc(){
  const price=parseInt(document.getElementById('h-price')?.value)||0;
  const shipping=parseInt(document.getElementById('h-shipping')?.value)||0;
  const feeRate=parseFloat(document.getElementById('h-platform')?.value)||0;
  const itemId=document.getElementById('h-item')?.value;
  const item=DB.stocks().find(s=>s.id===itemId);
  const cost=item?item.purchasePrice:0;
  const fee=Math.round(price*feeRate/100);
  const profit=price-cost-shipping-fee;
  const rate=price>0?((profit/price)*100).toFixed(1):0;
  document.getElementById('calc-price').textContent=fmtYen(price);
  document.getElementById('calc-cost').textContent=fmtYen(cost);
  document.getElementById('calc-ship').textContent=fmtYen(shipping);
  document.getElementById('calc-fee').textContent=fmtYen(fee);
  const ep=document.getElementById('calc-profit');
  ep.textContent=fmtYen(profit);
  ep.className=profit>=0?'profit-pos':'profit-neg';
  document.getElementById('calc-rate').textContent=rate+'%';
}

  const saleDate=document.getElementById('h-date').value;
  const salePrice=parseInt(document.getElementById('h-price').value)||0;

  const feeRate=parseFloat(document.getElementById('h-platform').value)||0;
  const platformEl=document.getElementById('h-platform');
  const platform=platformEl.options[platformEl.selectedIndex].text;
  const shippingEl=document.getElementById('h-shipping');
  const shippingLabel=shippingEl.options[shippingEl.selectedIndex].text;
  if(!itemId||!saleDate||!salePrice){showToast('商品・日付・価格は必須','var(--danger)');return;}
  const stocks=DB.stocks();
  const item=stocks.find(s=>s.id===itemId);
  if(!item){showToast('商品が見つかりません','var(--danger)');return;}
  const fee=Math.round(salePrice*feeRate/100);
  const profit=salePrice-item.purchasePrice-shipping-fee;
  // 販売記録
  const sales=DB.sales();
  sales.push(
    id:genId('SALE'),itemId,itemName:item.name,saleDate,salePrice,
    cost:item.purchasePrice,shipping,shippingMethod:shippingLabel,
    fee,platform,profit,
    profitRate:salePrice>0?((profit/salePrice)*100).toFixed(1):0,
    memo:document.getElementById('h-memo').value.trim(),
    createdAt:new Date().toISOString(),
  });
  DB.set('fg_sales',sales);ect-name">${p.name}</div>
